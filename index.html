<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard 📋</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">📋</div>
      <h1>Life Dashboard</h1>
    </div>
    <div class="topbar-right">
      <button class="theme-btn" id="theme-btn" title="Ganti tema">🌙</button>
    </div>
  </header>

  <!-- ===== MAIN DASHBOARD GRID ===== -->
  <main class="dashboard">

    <!-- GREETING CARD (full width) -->
    <section class="greeting-card" aria-label="Sapaan dan Waktu">
      <div class="greeting-left">
        <div class="greeting-text" id="greeting-text">Selamat Datang 👋</div>
        <div class="greeting-sub" id="date-display">Memuat tanggal…</div>
        <div class="name-edit-area">
          <input
            type="text"
            id="name-input"
            class="name-input"
            placeholder="Masukkan namamu…"
            maxlength="30"
            aria-label="Nama pengguna"
          />
          <button class="name-save-btn" id="name-save-btn">Simpan</button>
        </div>
      </div>
      <div class="greeting-right">
        <div class="time-display" id="time-display">00:00:00</div>
      </div>
    </section>

    <!-- TO-DO LIST -->
    <section class="card todo-card" aria-label="Daftar Tugas">
      <div class="card-header">
        <span class="card-title"><span class="icon">✅</span> Daftar Tugas</span>
        <div class="todo-header-actions">
          <select id="sort-select" class="sort-select" aria-label="Urutkan tugas">
            <option value="default">Terbaru</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="done">Belum Selesai Dulu</option>
            <option value="undone">Selesai Dulu</option>
          </select>
        </div>
      </div>

      <!-- Input tambah tugas -->
      <div class="todo-add-area">
        <input
          type="text"
          id="task-input"
          class="todo-input"
          placeholder="Tambah tugas baru… (tekan Enter)"
          maxlength="200"
          aria-label="Tugas baru"
        />
        <button id="add-task-btn" class="add-btn" title="Tambah tugas" aria-label="Tambah tugas">+</button>
      </div>

      <!-- Daftar tugas -->
      <ul id="task-list" class="task-list" aria-live="polite" aria-label="Daftar tugas"></ul>

      <!-- Footer -->
      <div class="task-footer">
        <span id="task-counter">0/0 selesai</span>
        <button id="clear-done-btn" class="clear-done-btn" title="Hapus semua yang sudah selesai">
          Hapus yang selesai
        </button>
      </div>
    </section>

    <!-- FOCUS TIMER -->
    <section class="card timer-card" aria-label="Timer Fokus">
      <div class="card-header">
        <span class="card-title"><span class="icon">⏱️</span> Timer Fokus</span>
      </div>

      <div class="timer-body">
        <!-- Custom duration -->
        <div class="duration-selector">
          <span class="duration-label">Durasi:</span>
          <input
            type="number"
            id="duration-input"
            class="duration-input"
            min="1"
            max="120"
            value="25"
            aria-label="Durasi timer dalam menit"
          />
          <span class="duration-label">menit</span>
          <button id="apply-duration-btn" class="btn btn-secondary" style="padding:5px 10px;font-size:12px;">Terapkan</button>
        </div>

        <!-- Ring timer -->
        <div class="timer-ring-wrap" role="timer" aria-label="Waktu tersisa">
          <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
            <circle class="timer-ring-bg" cx="90" cy="90" r="80"/>
            <circle class="timer-ring-progress" id="timer-ring-progress" cx="90" cy="90" r="80"/>
          </svg>
          <div class="timer-time-center">
            <div class="timer-time" id="timer-time">25:00</div>
            <div class="timer-label" id="timer-label">SIAP FOKUS</div>
          </div>
        </div>

        <!-- Tombol kontrol -->
        <div class="timer-controls">
          <button id="start-btn" class="btn btn-primary">▶ Mulai</button>
          <button id="stop-btn"  class="btn btn-secondary" disabled>⏸ Berhenti</button>
          <button id="reset-btn" class="btn btn-danger">↺ Reset</button>
        </div>
      </div>
    </section>

    <!-- QUICK LINKS -->
    <section class="card links-card" aria-label="Link Cepat">
      <div class="card-header">
        <span class="card-title"><span class="icon">🔗</span> Link Cepat</span>
      </div>

      <div class="links-body">
        <!-- Grid link -->
        <div id="links-grid" class="links-grid" aria-label="Daftar link favorit"></div>

        <!-- Form tambah link -->
        <div class="add-link-form">
          <input
            type="text"
            id="link-name"
            class="link-form-input"
            placeholder="Nama (misal: YouTube)"
            maxlength="40"
            aria-label="Nama link"
          />
          <input
            type="text"
            id="link-url"
            class="link-form-input"
            placeholder="URL (misal: youtube.com)"
            maxlength="200"
            aria-label="URL link"
          />
          <button id="add-link-btn" class="add-link-btn">+ Tambah Link</button>
        </div>
      </div>
    </section>

  </main>

  <!-- TOAST CONTAINER -->
  <div id="toast-container" class="toast-container" aria-live="assertive" aria-atomic="true"></div>

  <script src="app.js"></script>
</body>
</html>
